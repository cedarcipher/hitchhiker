name: E2E Tests

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Install dependencies
      run: pip install '.[e2e]'
    - name: Run E2E tests
      run: pytest tests/e2e -v -m e2e
